<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Doctor Pro</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>🩺 Data Doctor Pro</h1>

    <p>Upload • Diagnose • Clean • Download</p>

    <form method="POST" enctype="multipart/form-data">

        <input
            type="file"
            name="file"
            accept=".csv"
            required
        >

        <br><br>

        <button type="submit">
            Upload Dataset
        </button>

    </form>

    {% if message %}
        <h3>{{ message }}</h3>
    {% endif %}

</div>

</body>
</html>
